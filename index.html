<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FinanzApp · El juego del emprendedor</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Estilos CSS -->
    <link rel="stylesheet" href="styles.css">
    <!-- Manifest PWA (opcional) -->
    <link rel="manifest" href="manifest.json">
    <!-- Icono para móvil (por defecto) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>">
</head>
<body>
    <div class="app-container">
        <!-- Pantalla de inicio / Menú principal -->
        <section id="menu-screen" class="screen active">
            <div class="menu-content">
                <h1 class="game-title">Finanz<span>App</span></h1>
                <p class="subtitle">El juego del emprendedor</p>
                <div class="menu-buttons">
                    <button class="menu-btn play-btn" id="btn-play"><i class="fas fa-play"></i> Jugar</button>
                    <button class="menu-btn tips-btn" id="btn-tips"><i class="fas fa-lightbulb"></i> Consejos</button>
                    <button class="menu-btn settings-btn" id="btn-settings"><i class="fas fa-cog"></i> Ajustes</button>
                </div>
                <div class="footer-note">Aprende finanzas jugando</div>
            </div>
        </section>

        <!-- Mapa de niveles -->
        <section id="map-screen" class="screen">
            <header class="screen-header">
                <button class="back-btn" id="back-from-map"><i class="fas fa-arrow-left"></i></button>
                <h2>Mapa de niveles</h2>
                <div class="header-spacer"></div>
            </header>
            <div class="level-map">
                <!-- Los niveles se generarán con JS -->
                <div class="map-container" id="level-map-container"></div>
            </div>
        </section>

        <!-- Pantalla de juego (nivel) -->
        <section id="game-screen" class="screen">
            <header class="screen-header">
                <button class="back-btn" id="back-from-game"><i class="fas fa-arrow-left"></i></button>
                <h2 id="level-title">Nivel 1</h2>
                <div class="header-spacer"></div>
            </header>
            <div class="game-content">
                <div class="level-description" id="level-description">Aquí va la descripción</div>
                <div class="question-box" id="question-box"></div>
                <div class="answer-area" id="answer-area"></div>
                <button class="submit-btn" id="submit-answer">Comprobar <i class="fas fa-check"></i></button>
                <div class="feedback" id="feedback"></div>
            </div>
        </section>

        <!-- Pantalla de consejos -->
        <section id="tips-screen" class="screen">
            <header class="screen-header">
                <button class="back-btn" id="back-from-tips"><i class="fas fa-arrow-left"></i></button>
                <h2>Consejos financieros</h2>
                <div class="header-spacer"></div>
            </header>
            <div class="tips-content">
                <div class="tip-card" id="tip-display">
                    <i class="fas fa-quote-right"></i>
                    <p id="tip-text">Carga tus consejos...</p>
                </div>
                <button class="next-tip-btn" id="next-tip"><i class="fas fa-sync-alt"></i> Siguiente consejo</button>
            </div>
        </section>

        <!-- Pantalla de ajustes -->
        <section id="settings-screen" class="screen">
            <header class="screen-header">
                <button class="back-btn" id="back-from-settings"><i class="fas fa-arrow-left"></i></button>
                <h2>Ajustes</h2>
                <div class="header-spacer"></div>
            </header>
            <div class="settings-content">
                <div class="setting-item">
                    <span><i class="fas fa-volume-up"></i> Sonido</span>
                    <label class="switch">
                        <input type="checkbox" id="sound-toggle" checked>
                        <span class="slider round"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <span><i class="fas fa-mobile-alt"></i> Vibración</span>
                    <label class="switch">
                        <input type="checkbox" id="vibration-toggle" checked>
                        <span class="slider round"></span>
                    </label>
                </div>
                <div class="setting-item">
                    <span><i class="fas fa-redo-alt"></i> Reiniciar progreso</span>
                    <button class="reset-btn" id="reset-progress">Reiniciar</button>
                </div>
            </div>
        </section>

        <!-- Modal para mensajes rápidos (ej. nivel completado) -->
        <div id="modal" class="modal">
            <div class="modal-content">
                <p id="modal-message">¡Nivel superado!</p>
                <button id="modal-close">Continuar</button>
            </div>
        </div>
    </div>

    <!-- Script principal -->
    <script src="script.js"></script>
</body>
</html>
